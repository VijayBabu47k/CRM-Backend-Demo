services:
  - type: web
    name: crm-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm run db:migrate && npm run db:seed && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
